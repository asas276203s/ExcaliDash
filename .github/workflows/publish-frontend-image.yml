name: Publish frontend image

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'VERSION'
      - '.github/workflows/publish-frontend-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/excalidash-frontend
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Read VERSION file
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # The frontend Dockerfile expects the repo root as the build context
          # (COPY frontend/... ./). Do NOT change to ./frontend.
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Keep single-arch (linux/amd64) — matches Zeabur runtime and
          # the base image the previous overlay used.
          platforms: linux/amd64
          build-args: |
            VITE_APP_VERSION=${{ steps.version.outputs.value }}
            VITE_APP_BUILD_LABEL=multi-tab-board
          cache-from: type=gha
          cache-to: type=gha,mode=max
