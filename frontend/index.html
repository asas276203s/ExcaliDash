<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- PWA / iOS home-screen assets. Icons and manifest sourced from the
       excalidash-frontend-bamolab overlay repo so macOS/iOS "Add to Dock" /
       "Add to Home Screen" gets a sharp branded icon instead of the tiny
       favicon.svg fallback. -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ExcaliDash" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#5645d4" />
  <title>ExcaliDash</title>
</head>

<body>
  <div id="root"></div>
  <script>
    (function () {
      if (typeof window.EXCALIDRAW_ASSET_PATH === "string" && window.EXCALIDRAW_ASSET_PATH.length > 0) return;
      var base = "%BASE_URL%";
      if (base === "%BASE_URL%") base = "/";
      if (base && base[base.length - 1] !== "/") base += "/";
      window.EXCALIDRAW_ASSET_PATH = new URL(base || "/", window.location.origin).toString();
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
